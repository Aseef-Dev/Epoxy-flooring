<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EPOXY FLOORING | Assam</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0c0c0d;
  color:white;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav a{
  color:#ccc;
  text-decoration:none;
}

nav a:hover{
  color:gold;
}

.menu{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
  background:url('https://images.unsplash.com/photo-1581579186913-45ac3e6efe93?w=1600&q=80') center/cover;
}

.hero h1{
  font-size:40px;
}

.btn{
  padding:12px 20px;
  border-radius:30px;
  margin:10px;
  cursor:pointer;
  border:none;
}

.primary{
  background:gold;
  color:black;
}

.ghost{
  border:1px solid gold;
  background:none;
  color:white;
}

/* SECTIONS */
section{
  padding:80px 20px;
}

.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.service{
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
}

.service img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.service h3{
  padding:15px;
}

/* CONTACT */
form input, form textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
}

/* MOBILE */
@media(max-width:700px){
  nav ul{
    display:none;
    flex-direction:column;
    position:absolute;
    top:60px;
    right:0;
    background:#111;
    width:200px;
    padding:20px;
  }

  nav ul.active{
    display:flex;
  }

  .menu{
    display:block;
  }
}
</style>
</head>

<body>

<header>
  <h3>EPOXY FLOORING</h3>

  <nav>
    <ul id="navMenu">
      <li><a href="#home">Home</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div>
    <h1>Premium Epoxy Flooring</h1>
    <p>Doboka • Hojai • Assam</p>

    <button class="btn primary" onclick="scrollToSection('contact')">
      Get Quote
    </button>

    <button class="btn ghost" onclick="callNow()">
      Call Now
    </button>
  </div>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Our Services</h2>

  <div class="services">

    <div class="service">
      <img src="https://images.unsplash.com/photo-1618219944342-824e40a13285?w=1200&q=80"
           onerror="this.src='https://via.placeholder.com/400x300'">
      <h3>Metallic Epoxy</h3>
    </div>

    <div class="service">
      <img src="https://images.unsplash.com/photo-1565182999561-18d7dc61c393?w=1200&q=80"
           onerror="this.src='https://via.placeholder.com/400x300'">
      <h3>Industrial Flooring</h3>
    </div>

    <div class="service">
      <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=1200&q=80"
           onerror="this.src='https://via.placeholder.com/400x300'">
      <h3>Residential Floors</h3>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>

  <form onsubmit="sendWhatsApp(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <textarea id="msg" placeholder="Project Details"></textarea>

    <button class="btn primary">Send Enquiry</button>
  </form>

  <br>

  <button class="btn ghost" onclick="openWhatsApp()">
    WhatsApp Direct
  </button>
</section>

<footer>
  © 2026 Epoxy Flooring
</footer>

<!-- JAVASCRIPT -->
<script>

// menu toggle
function toggleMenu(){
  document.getElementById("navMenu").classList.toggle("active");
}

// scroll
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

// call
function callNow(){
  window.location.href = "tel:8011392495";
}

// whatsapp direct
function openWhatsApp(){
  window.open("https://wa.me/918011392495","_blank");
}

// form send
function sendWhatsApp(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let msg = document.getElementById("msg").value;

  let text = `Hello, I'm ${name}%0APhone: ${phone}%0ADetails: ${msg}`;

  window.open("https://wa.me/918011392495?text=" + text,"_blank");
}

</script>

</body>
</html>
